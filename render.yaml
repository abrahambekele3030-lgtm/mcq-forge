# mcq-forge — Render blueprint (free tier)
# Docs: https://render.com/docs/blueprint-spec
# Deploy: push this repo to GitHub, then in Render:
#   New -> Blueprint -> select repo -> Render reads this file.

services:
  - type: web
    name: mcq-forge
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: MCQFORGE_PROVIDER
        value: glm
      - key: ZAI_API_KEY
        sync: false               # set in the Render dashboard (secret)
      - key: DATABASE_URL
        value: file:/data/db/custom.db
      - key: MCQFORGE_MAX_ROUNDS
        value: "10"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
    # Render free tier does not include persistent disks. Two options:
    #   1. Accept that SQLite + uploaded PDFs are ephemeral (fine for trials).
    #   2. Attach a disk (paid) by uncommenting the disk: block below.
    #   3. Switch DATABASE_URL to a free Neon/Supabase Postgres and update
    #      prisma/schema.prisma datasource provider to "postgresql".
    # disk:
    #   name: mcqforge-data
    #   mountPath: /data
    #   sizeGB: 1
