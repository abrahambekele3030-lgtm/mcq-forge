# Render Blueprint — deploy with one click
# Go to render.com → Dashboard → New → Blueprint → connect your GitHub repo
services:
  - type: web
    name: mcq-forge
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: ZAI_API_KEY
        sync: false  # Set this in the Render dashboard
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    healthCheckPath: /
    autoDeploy: true
