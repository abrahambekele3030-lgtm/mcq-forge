# mcq-forge — Render blueprint (free tier)
# Docs: https://render.com/docs/blueprint-spec
# Deploy: push this repo to GitHub, then in Render:
#   New -> Blueprint -> select repo -> Render reads this file.
#
# This blueprint assumes you have created a PostgreSQL database (either on
# Render's own Postgres free tier, or on Neon / Supabase). Set DATABASE_URL
# to that database's internal connection string in the Render dashboard.

databases:
  - name: mcq-forge-db
    plan: free
    databaseName: mcq_forge
    user: mcq_forge_db_user

services:
  - type: web
    name: mcq-forge
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: MCQFORGE_PROVIDER
        value: glm
      - key: ZAI_API_KEY
        sync: false               # set in the Render dashboard (secret)
      - key: DATABASE_URL
        fromDatabase:
          name: mcq-forge-db
          property: connectionString
      - key: MCQFORGE_MAX_ROUNDS
        value: "10"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
